# Training Pipeline Config
# 스크립트 최소화: run_training_pipeline.py 단일 진입점

use_gpu: true  # LGBM, CatBoost GPU 가속

# Lag feature clustering (base별 대표 lag 1개, 최종 50개 미만)
feature_cluster:
  enabled: true
  top_k_per_base: 1
  max_final: 50
  seasonal_lags: [364, 365, 366]  # 항상 유지 (feature_selection과 동일)

# 데이터 분할
# test_days=0이면 test_ratio(10%) 사용 (70일 고정 아님)
# seed 고정 시 split 고정 → 모델 비교 시 동일 split 사용
split:
  test_days: 0                     # 0이면 test_ratio 사용
  test_ratio: 0.1                  # 전체 unique date의 10% (계절 균형)
  seed: 42                          # split 고정 (바꾸면 다른 split)

# 품종: 대표 품종 또는 최다 품종
variety:
  use_top_only: true    # true면 representative 또는 top_n 적용
  top_n: 1              # representative_varieties 미지정 시 상위 N개
  # 1개: ["후지"], 3개: ["후지","홍로","미시마"] - 해당 품종 데이터 있는 날짜만 유효
  representative_varieties: ["후지"]

# CV 방법: expanding, timeseries, purged
cv:
  method: "purged"     # expanding | timeseries | purged
  valid_days: 30
  n_folds: 5
  purge_days: 7        # purged용
  embargo_days: 3      # purged용

# Feature 재정제 (SHAP)
feature_refine:
  top_n_by_mean: 60
  min_rank_corr: 0.4
  max_final: 60
  min_final: 40

# Target 전처리
target:
  loss: "mape"           # mape | mse (mape: raw target + MAPE loss, mse: log target + MSE)
  use_log: true          # mse일 때만 사용 (mape면 raw)
  outlier_clip_pct: 1.0  # 상/하위 1% clip (spike 제거)

# Baseline
baseline:
  naive_lag: 1
  seasonal_lag: 7

# LightGBM (Primary)
lgb:
  n_estimators: 800
  num_leaves: [15, 31, 63]
  max_depth: [3, 5, 6, 8]
  min_data_in_leaf: [20, 40, 80]
  feature_fraction: [0.6, 0.8, 0.9]
  bagging_fraction: [0.6, 0.8, 0.9]
  lambda_l1: [0, 1, 10]
  lambda_l2: [0, 1, 10]
  n_trials: 50                     # Optuna trials (또는 grid 샘플)

# CatBoost (Secondary)
catboost:
  iterations: 800
  depth: [4, 6, 8]
  n_trials: 20

# ElasticNet
elasticnet:
  alphas: [0.01, 0.1, 1.0, 10.0]
  l1_ratios: [0.1, 0.5, 0.9]

# 실행할 모델 (미지정 시 전체: lgb, catboost, elasticnet, lstm, transformer)
# models: [lgb, catboost, elasticnet, lstm, transformer]
models: null

# Stacking (LGB+CatBoost, 필요시 LSTM 포함)
stacking:
  oof_corr_threshold: 0.95         # LGBM vs CatBoost OOF corr < 이면 stacking
  meta_model: "ridge"
  include_lstm: false              # true면 LSTM OOF도 stacking에 포함 (다양한 앙상블)

# Deep 모델 (LSTM, Transformer) - eval, early stopping, checkpoint, dropout
lstm:
  enabled: true
  seq_len: 365
  hidden: 64
  layers: 2
  epochs: 150
  patience: 15
  dropout: 0.3

transformer:
  enabled: false         # MAPE 40%+ 수준으로 비활성화
  seq_len: 365
  d_model: 32
  nhead: 4
  num_layers: 2
  epochs: 150
  patience: 15
  dropout: 0.3
