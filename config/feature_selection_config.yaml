# Feature Selection Pipeline Config
# 모든 품종에 동일한 lag/feature 적용 (품종별 차이 없음)

use_gpu: true  # LightGBM GPU 가속 (CUDA 필요)

# 데이터 기간 (수집 파일명과 일치: auction_20200101_20251231.csv 등)
data_range:
  start: "20200101"
  end: "20251231"

# Popular 품종만 사용 (하나만 설정)
variety_filter:
  min_pct: 1.0        # 전체 대비 N% 이상 품종만 (null이면 전체)
  whitelist: null    # ["후지","홍로","미시마"] 지정 시 해당만
  max_varieties: null # 10 지정 시 상위 10개만

lag_depths:
  target_price: 60   # price_per_kg_mean lag 1~60 (autoregressive)
  domae_somae: 30    # 도매/소매 lag 1~30
  weather: 21        # 날씨 lag 1~21

# 연간 계절성 (Year-over-Year) - 별도 관리, feature selection에서 항상 포함
seasonal_lags:
  enabled: true
  lags: [364, 365, 366]   # 1년 전 ±1일 (윤년 대응)

rolling_windows:
  - 7
  - 14
  - 30

stage1_prefilter:
  ccf_threshold: 0.15      # |ρ| > threshold 유의 lag만 유지
  mi_percentile: 75         # 상위 percentile만 유지

stage2_elasticnet:
  cv_splits: 5
  max_iter: 50000
  tol: 0.001               # 수렴 허용 오차 (높을수록 빨리 수렴)
  alphas: [0.1, 1.0, 10.0, 100.0]
  l1_ratios: [0.1, 0.5, 0.9]
  use_lightgbm_fallback: true  # true면 Elastic Net 대신 LightGBM (GPU, 수렴 이슈 없음)

stage3_rolling_permutation:
  n_windows: 5
  min_window_size: 60
  stability_lambda: 0.3    # 완화 (1.0→0.3)
  top_percentile: 50       # 상위 50%는 무조건 유지
  min_kept: 50             # 최소 50개 유지

stage4_stability:
  min_jaccard: 0.5
  min_rank_corr: 0.3
  min_kept: 30             # 최소 30개 유지

stage5_common:
  min_variety_ratio: 0.5   # 완화 (0.7→0.5)
  top_k_per_variety: 80    # 상위 80개 고려
  min_kept: 20             # 최소 20개 유지

# Stage 6: Lag clustering (base별 대표 lag 1개, 최종 50개 미만)
feature_cluster:
  enabled: true
  top_k_per_base: 1
  max_final: 50
  # seasonal_lags(364,365,366)는 clustering에서 제외하고 항상 유지
